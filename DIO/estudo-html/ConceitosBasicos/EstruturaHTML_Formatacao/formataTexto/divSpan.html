<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Estrutura Div e Span</title>
    <style>
        span {
            color: goldenrod;
            font-weight: bold;
            
        }
    </style>
</head>
<body>
    <!--Sempre se estrutura de fora para  dentro-->

    <!-- A tag div é um elemento de bloco, ou seja, ela ocupa toda a largura disponível e 
    inicia em uma nova linha. Ela é usada para agrupar outros elementos e aplicar estilos 
    ou layout a eles. -->
    
    <div>
        <p>Este é um parágrafo dentro de um elemento div.</p>
    </div>

    
    <!-- A tag span é um elemento inline, ou seja, ela não ocupa toda a largura disponível e
    não inicia em uma nova linha. Ela é usada para aplicar estilos ou marcar partes de 
    texto dentro de outros elementos. -->
    
    <p>Este é um parágrafo com <span style="color: red;">texto em vermelho</span> dentro de um elemento span.</p>

    <!--Exemplos-->

    <div id="menu-lateral"> 
        <div id="links">
            <ul>
                <li><a href="#">Link 1</a></li>
                <li><a href="#">Link 2</a></li>
                <li><a href="#">Link 3</a></li>
            </ul>
    </div>

    <!--Span-->
    <p>Dio<span><strong>.</strong></span>me</p>

</body>
</html>
